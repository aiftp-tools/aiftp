name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # v0.3 added Windows credential support; the unit-test suite runs the
        # Windows-backend logic against a stubbed exec on every OS so the
        # macOS runner still covers the Windows code path. The windows-latest
        # row additionally exercises the Node toolchain natively (pnpm,
        # build, typecheck, biome, vitest) on a real Windows runner so any
        # path-separator / line-ending regression surfaces here, not at the
        # user's machine.
        os: [macos-latest, windows-latest]
        node: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.1
          run_install: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test
